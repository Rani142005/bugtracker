{% extends 'base_app.html' %}

{% block content %}

<div class="modern-panel p-3 p-md-4">
        <h4 class="mb-3">Create Bug</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" name="title" placeholder="Enter bug title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select class="form-select" name="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Severity</label>
                <select class="form-select" name="severity">
                    <option value="Trivial">Trivial</option>
                    <option value="Minor" selected>Minor</option>
                    <option value="Major">Major</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Assign To</label>
                <select name="assigned_to" class="form-select" required>
                    {% for user in users %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Attachments</label>
                <input class="form-control" type="file" name="attachments" multiple>
                <div class="form-text">Upload screenshots, logs, or recordings.</div>
            </div>

            <button class="btn btn-primary">Submit Bug</button>

        </form>

</div>

{% endblock %}
