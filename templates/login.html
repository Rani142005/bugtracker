{% extends 'base_auth.html' %}

{% block content %}

<div class="card auth-box shadow p-4">
    <h3 class="text-center mb-4">Login</h3>

    {% if success_message %}
    <p class="text-success text-center mb-3">{{ success_message }}</p>
    {% endif %}

    {% if error_message %}
    <p class="text-danger text-center mb-3">{{ error_message }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input class="form-control mb-3" name="username" placeholder="Username" autocomplete="username">
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" autocomplete="current-password">

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3 mb-0">
        No account? <a href="/register/">Register</a>
    </p>

</div>

{% endblock %}
